<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>好友限定抽獎</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 24px;
        margin: 0;
      }
      #root {
        display: none;
      }
      .box {
        max-width: 640px;
        margin: 40px auto;
        text-align: center;
        line-height: 1.7;
        word-break: break-word;
      }
      .error {
        color: #c62828;
        white-space: pre-wrap;
        text-align: left;
        margin-top: 16px;
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="gate" class="box">載入中…</div>
    <div id="root"></div>

    <script>
      const LIFF_ID = "2009551865-w1GySXcD";
      const ADD_FRIEND_URL = "https://line.me/R/ti/p/@209sgiku";

      async function checkFriend() {
        const gate = document.getElementById("gate");
        const root = document.getElementById("root");

        try {
          gate.innerHTML = "LIFF 初始化中…";

          if (typeof liff === "undefined") {
            throw new Error("LIFF SDK 未載入");
          }

          await liff.init({
            liffId: LIFF_ID,
            withLoginOnExternalBrowser: true
          });

          const os = liff.getOS();
          const inClient = liff.isInClient();
          const loggedIn = liff.isLoggedIn();

          gate.innerHTML =
            "LIFF 初始化成功<br>" +
            "OS: " + os + "<br>" +
            "isInClient: " + inClient + "<br>" +
            "isLoggedIn: " + loggedIn;

          if (!loggedIn) {
            liff.login();
            return;
          }

          const friendship = await liff.getFriendship();

          if (!friendship.friendFlag) {
            gate.innerHTML = `
              <div class="box">
                請先加入好友才能抽獎<br><br>
                <a href="${ADD_FRIEND_URL}" style="font-size:22px;color:#06C755">
                  加入好友
                </a>
              </div>
            `;
            return;
          }

          gate.style.display = "none";
          root.style.display = "block";
        } catch (err) {
          console.error("LIFF ERROR:", err);

          gate.innerHTML = `
            <div>LIFF 載入失敗</div>
            <div class="error">
message: ${err?.message || "無"}
name: ${err?.name || "無"}
stack: ${err?.stack || "無"}
userAgent: ${navigator.userAgent}
url: ${location.href}
            </div>
          `;
        }
      }

      window.addEventListener("load", checkFriend);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
