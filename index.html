<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>好友限定抽獎</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
      }
      #gate {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .gate-card {
        width: 100%;
        max-width: 680px;
        background: #fff;
        border-radius: 16px;
        padding: 28px 22px;
        box-sizing: border-box;
        text-align: center;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        line-height: 1.7;
      }
      .btn {
        display: inline-block;
        margin-top: 14px;
        padding: 12px 18px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        background: #06c755;
        color: #fff;
      }
      .debug {
        margin-top: 18px;
        text-align: left;
        white-space: pre-wrap;
        word-break: break-word;
        color: #c62828;
        background: #f3f3f3;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
      }
      #root {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="gate">
      <div class="gate-card" id="gateCard">載入中…</div>
    </div>

    <div id="root"></div>

    <script type="module">
      const LIFF_ID = "2009551865-w1GySXcD";
      const ADD_FRIEND_URL = "https://line.me/R/ti/p/@209sgiku";

      let checkingFriend = false;

      async function checkFriend() {
        const gate = document.getElementById("gate");
        const gateCard = document.getElementById("gateCard");
        const root = document.getElementById("root");

        try {
          gateCard.innerHTML = "LIFF 初始化中…";

          await liff.init({
            liffId: LIFF_ID,
            withLoginOnExternalBrowser: true
          });

          if (location.hash.startsWith("#/liff-redirect")) {
            history.replaceState(null, "", "/lottery-site-1/");
          }

          const inClient = liff.isInClient();
          const loggedIn = liff.isLoggedIn();

          if (!loggedIn) {
            gateCard.innerHTML = `
              <div style="font-size:28px;font-weight:bold;">尚未登入 LIFF</div>
              <div style="margin-top:12px;">請直接從 LINE 內重新開啟這個 LIFF 連結。</div>
              <div class="debug">
isInClient: ${inClient}
isLoggedIn: ${loggedIn}
url: ${location.href}
              </div>
            `;
            return;
          }

          const friendship = await liff.getFriendship();

          if (!friendship.friendFlag) {
            gateCard.innerHTML = `
              <div style="font-size:28px;font-weight:bold;">請先加入好友</div>
              <div style="margin-top:12px;">加入後會自動回到抽獎頁。</div>

              <a
                id="addFriendBtn"
                class="btn"
                href="${ADD_FRIEND_URL}"
                rel="noopener noreferrer"
              >
                加入好友
              </a>

              <div class="debug">
friendFlag: ${friendship.friendFlag}
url: ${location.href}
              </div>
            `;

            const addFriendBtn = document.getElementById("addFriendBtn");
            addFriendBtn?.addEventListener("click", () => {
              sessionStorage.setItem("waiting_friendship_check", "1");
            });

            return;
          }

          sessionStorage.removeItem("waiting_friendship_check");
          gate.style.display = "none";
          root.style.display = "block";
        } catch (err) {
          gateCard.innerHTML = `
            <div style="font-size:28px;font-weight:bold;">LIFF 載入失敗</div>
            <div class="debug">
message: ${err?.message || "無"}
name: ${err?.name || "無"}
url: ${location.href}
            </div>
          `;
        }
      }

      async function recheckIfNeeded() {
        if (document.visibilityState !== "visible") return;
        if (sessionStorage.getItem("waiting_friendship_check") !== "1") return;
        if (checkingFriend) return;

        checkingFriend = true;
        try {
          await checkFriend();
        } finally {
          checkingFriend = false;
        }
      }

      window.addEventListener("load", checkFriend);
      window.addEventListener("visibilitychange", recheckIfNeeded);
      window.addEventListener("focus", recheckIfNeeded);
    </script>

    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
