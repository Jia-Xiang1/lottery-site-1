<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>好友限定抽獎</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 24px;
        margin: 0;
      }
      #root {
        display: none;
      }
      .box {
        max-width: 640px;
        margin: 40px auto;
        text-align: center;
        line-height: 1.7;
        word-break: break-word;
      }
      .error {
        color: #c62828;
        white-space: pre-wrap;
        text-align: left;
        margin-top: 16px;
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
      }
    </style>
    <script type="module" crossorigin src="/lottery-site-1/assets/index-UZknyYYd.js"></script>
    <link rel="stylesheet" crossorigin href="/lottery-site-1/assets/index-C6D-zbW_.css">
  </head>
  <body>
    <div id="gate" class="box">載入中…</div>
    <div id="root"></div>

    <script>
  const LIFF_ID = "2009551865-w1GySXcD";
  const ADD_FRIEND_URL = "https://line.me/R/ti/p/@209sgiku";

  async function checkFriend() {
    const gate = document.getElementById("gate");
    const root = document.getElementById("root");

    try {
      gate.innerHTML = "LIFF 初始化中…";

      await liff.init({
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      });

      const inClient = liff.isInClient();
      const loggedIn = liff.isLoggedIn();

      gate.innerHTML =
        "LIFF 初始化成功<br>" +
        "isInClient: " + inClient + "<br>" +
        "isLoggedIn: " + loggedIn;

      // 只在「LINE 外部瀏覽器」才做 login
      if (!loggedIn) {
        if (!inClient) {
          liff.login({
            redirectUri: "https://jia-xiang1.github.io/lottery-site-1/"
          });
          return;
        } else {
          gate.innerHTML = "請從 LINE 內重新開啟此頁";
          return;
        }
      }

      const friendship = await liff.getFriendship();

      if (!friendship.friendFlag) {
        gate.innerHTML = `
          <div style="text-align:center;padding:40px;font-size:20px">
            請先加入好友才能抽獎<br><br>
            <a href="${ADD_FRIEND_URL}" style="font-size:22px;color:#06C755">
              加入好友
            </a>
          </div>
        `;
        return;
      }

      gate.style.display = "none";
      root.style.display = "block";
    } catch (err) {
      console.error("LIFF ERROR:", err);
      gate.innerHTML = `
        <div>LIFF 載入失敗</div>
        <pre style="color:red;white-space:pre-wrap;text-align:left;">${err?.message || err}</pre>
      `;
    }
  }

  window.addEventListener("load", checkFriend);
</script>

  </body>
</html>
